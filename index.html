<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSU Challenge Course · Game Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --bg2: #0f1729;
    --bg3: #162035;
    --border: #1e2d45;
    --border2: #2a3f5f;
    --text: #e8edf5;
    --muted: #7a90b0;
    --faint: #3a4f6a;
    --gold: #CEB069;
    --gold2: #e8c97a;
    --garnet: #782F40;
    --garnet2: #a03d52;
    --blue: #4a9eff;
    --green: #3ecf8e;
    --orange: #f5a623;
    --purple: #a78bfa;
    --pink: #f472b6;
    --yellow: #facc15;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--garnet), var(--gold)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
  .logo-sub { font-size: 11px; color: var(--muted); font-weight: 500; }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--muted); transition: all 0.15s; }
  .nav-tab:hover { color: var(--text); background: var(--bg3); }
  .nav-tab.active { background: var(--bg3); color: var(--gold); border: 1px solid var(--border2); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .plan-btn {
    background: var(--garnet); color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: background 0.15s;
  }
  .plan-btn:hover { background: var(--garnet2); }
  .plan-badge { background: var(--gold); color: #000; border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 800; }

  /* MAIN CONTENT */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 230px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .filter-section-title {
    font-size: 10px; font-weight: 700; color: var(--faint);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .search-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; color: var(--text);
    font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--border2); }
  .search-input::placeholder { color: var(--faint); }
  .filter-chips { display: flex; flex-direction: column; gap: 4px; }
  .chip {
    padding: 6px 11px; border-radius: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: var(--bg3);
    color: var(--muted); transition: all 0.15s; text-align: left;
    display: flex; align-items: center; gap: 6px;
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.active { border-color: var(--gold); color: var(--gold); background: rgba(206,176,105,0.1); }
  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip-row .chip { font-size: 11px; padding: 4px 10px; }
  .num-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; color: var(--text);
    font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif;
  }
  .num-input:focus { border-color: var(--border2); }
  .clear-btn {
    background: none; border: 1px solid var(--border); color: var(--faint);
    border-radius: 7px; padding: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer; width: 100%; transition: all 0.15s;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--border2); }

  /* GAME GRID */
  .content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .content-count { font-size: 13px; color: var(--muted); }
  .add-game-btn {
    background: linear-gradient(135deg, var(--garnet), #9e3a4d);
    color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: opacity 0.15s;
  }
  .add-game-btn:hover { opacity: 0.9; }

  /* GAME CARD */
  .game-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 18px;
    transition: border-color 0.2s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .game-card:hover { border-color: var(--border2); }
  .game-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .game-name { font-size: 16px; font-weight: 700; color: var(--text); font-family: 'Syne', sans-serif; }
  .game-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .game-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-add-plan {
    background: rgba(74,158,255,0.15); color: var(--blue);
    border: 1px solid rgba(74,158,255,0.3); border-radius: 7px;
    padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-add-plan:hover { background: rgba(74,158,255,0.25); }
  .btn-add-plan.in-plan { background: rgba(62,207,142,0.15); color: var(--green); border-color: rgba(62,207,142,0.3); }
  .btn-edit {
    background: var(--bg3); color: var(--muted); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 10px; font-size: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-edit:hover { color: var(--text); border-color: var(--border2); }
  .goal-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .goal-tag {
    padding: 2px 9px; border-radius: 4px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em; text-transform: uppercase;
  }
  .game-desc { font-size: 13px; color: #9aabbc; line-height: 1.55; }
  .expand-btn {
    background: none; border: none; color: var(--blue); cursor: pointer;
    font-size: 12px; font-weight: 600; text-align: left; padding: 0;
    transition: opacity 0.15s;
  }
  .expand-btn:hover { opacity: 0.8; }
  .game-details { border-top: 1px solid var(--border); padding-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .detail-label { font-size: 10px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
  .detail-text { font-size: 13px; color: #b8ccd8; line-height: 1.5; }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--faint); }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state-title { font-size: 16px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }

  /* MODAL OVERLAY */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); padding: 28px;
    width: 100%; max-height: 90vh; overflow-y: auto;
  }
  .modal-sm { max-width: 500px; }
  .modal-lg { max-width: 680px; }
  .modal-xl { max-width: 780px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-title { font-size: 20px; font-weight: 800; color: var(--text); }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 22px; transition: color 0.15s; padding: 0; }
  .modal-close:hover { color: var(--text); }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .form-input, .form-textarea, .form-select {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--gold); }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .form-select option { background: var(--bg3); }
  .form-checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .form-checkbox-chip {
    padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: var(--bg3);
    color: var(--muted); transition: all 0.15s; user-select: none;
  }
  .form-checkbox-chip.selected { border-color: var(--gold); color: var(--gold); background: rgba(206,176,105,0.1); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .form-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
  .btn-primary {
    background: var(--garnet); color: #fff; border: none;
    border-radius: 8px; padding: 10px 22px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .btn-primary:hover { background: var(--garnet2); }
  .btn-secondary {
    background: var(--bg3); color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 22px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--border2); }
  .btn-danger {
    background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px; padding: 10px 18px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }

  /* SESSION PLAN MODAL */
  .plan-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .plan-item {
    background: var(--bg3); border-radius: 10px; padding: 13px 15px;
    display: flex; align-items: center; gap: 12px; cursor: grab;
    border: 1px solid var(--border); transition: border-color 0.15s;
  }
  .plan-item:hover { border-color: var(--border2); }
  .plan-item.dragging { opacity: 0.5; border-color: var(--gold); }
  .plan-item.drag-over { border-color: var(--blue); background: rgba(74,158,255,0.05); }
  .plan-num { background: var(--garnet); color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; font-family: 'Syne', sans-serif; }
  .plan-item-info { flex: 1; min-width: 0; }
  .plan-item-name { font-weight: 700; font-size: 14px; color: var(--text); }
  .plan-item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .plan-remove { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 18px; transition: color 0.15s; padding: 0 4px; }
  .plan-remove:hover { color: #ef4444; }
  .plan-drag-handle { color: var(--faint); font-size: 16px; cursor: grab; }
  .plan-summary {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .plan-summary-item { display: flex; flex-direction: column; gap: 2px; }
  .plan-summary-label { font-size: 10px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; }
  .plan-summary-value { font-size: 14px; font-weight: 700; color: var(--gold); }
  .arc-warning {
    background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2);
    border-radius: 8px; padding: 10px 13px; font-size: 12px; color: var(--orange);
    display: flex; gap: 8px; align-items: flex-start;
  }
  .plan-empty { text-align: center; padding: 40px; color: var(--faint); }
  .plan-actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn-export {
    flex: 1; background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .btn-export:hover { border-color: var(--border2); background: var(--bg2); }

  /* FACILITATION MODE */
  .facil-mode {
    background: var(--bg); min-height: 100%; padding: 32px;
    display: flex; flex-direction: column; gap: 24px; max-width: 700px; margin: 0 auto;
  }
  .facil-header { display: flex; align-items: center; justify-content: space-between; }
  .facil-nav { display: flex; gap: 10px; }
  .facil-btn {
    background: var(--bg2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .facil-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border2); }
  .facil-btn:disabled { opacity: 0.3; cursor: default; }
  .facil-btn.primary { background: var(--garnet); border-color: var(--garnet); color: #fff; }
  .facil-game-name { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1.1; }
  .facil-meta { display: flex; gap: 14px; flex-wrap: wrap; }
  .facil-meta-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--muted); }
  .facil-meta-icon { font-size: 16px; }
  .facil-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .facil-section-title { font-size: 12px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .facil-text { font-size: 15px; color: var(--text); line-height: 1.65; }
  .facil-progress { display: flex; gap: 6px; }
  .facil-progress-dot { height: 6px; flex: 1; border-radius: 3px; background: var(--border); transition: background 0.3s; }
  .facil-progress-dot.done { background: var(--green); }
  .facil-progress-dot.current { background: var(--gold); }
  .timer-display {
    font-size: 48px; font-weight: 800; font-family: 'Syne', sans-serif;
    color: var(--gold); letter-spacing: -0.02em; text-align: center; padding: 16px 0;
  }
  .timer-display.warning { color: var(--orange); }
  .timer-display.over { color: #ef4444; }
  .timer-controls { display: flex; gap: 8px; justify-content: center; }
  .timer-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .timer-btn:hover { border-color: var(--border2); }
  .timer-btn.active { background: var(--garnet); border-color: var(--garnet); }

  /* SESSION PLAN TAB */
  .session-tab { flex: 1; overflow-y: auto; padding: 24px; }
  .session-tab-inner { max-width: 800px; margin: 0 auto; }
  .session-name-input {
    font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
    color: var(--text); background: none; border: none; outline: none;
    width: 100%; padding: 4px 0; border-bottom: 2px solid var(--border);
    transition: border-color 0.15s; margin-bottom: 24px;
  }
  .session-name-input:focus { border-color: var(--gold); }
  .session-plan-list { display: flex; flex-direction: column; gap: 10px; }
  .session-plan-item {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 16px 18px; display: flex; gap: 14px; align-items: flex-start;
    cursor: grab; transition: border-color 0.15s;
  }
  .session-plan-item:hover { border-color: var(--border2); }
  .session-plan-item.dragging { opacity: 0.4; }
  .session-plan-item.drag-over { border-color: var(--gold); }
  .session-item-num {
    background: var(--garnet); color: #fff; width: 28px; height: 28px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; flex-shrink: 0; margin-top: 2px;
    font-family: 'Syne', sans-serif;
  }
  .session-item-content { flex: 1; }
  .session-item-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .session-item-tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 6px 0; }
  .session-item-note {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 10px; color: var(--text);
    font-size: 12px; font-family: 'DM Sans', sans-serif; outline: none;
    margin-top: 8px; resize: none; transition: border-color 0.15s;
  }
  .session-item-note:focus { border-color: var(--border2); }
  .session-item-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--faint); font-size: 16px; padding: 4px; transition: color 0.15s; }
  .icon-btn:hover { color: var(--text); }
  .icon-btn.danger:hover { color: #ef4444; }
  .session-summary-bar {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 16px 20px; display: flex; gap: 24px; flex-wrap: wrap;
    margin-bottom: 20px; align-items: center; justify-content: space-between;
  }
  .ssb-item { display: flex; flex-direction: column; gap: 2px; }
  .ssb-label { font-size: 10px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; }
  .ssb-value { font-size: 16px; font-weight: 700; color: var(--gold); }
  .arc-badge {
    padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700;
    background: rgba(62,207,142,0.1); color: var(--green); border: 1px solid rgba(62,207,142,0.2);
  }
  .arc-badge.warn { background: rgba(245,166,35,0.1); color: var(--orange); border-color: rgba(245,166,35,0.2); }
  .add-from-catalog {
    border: 2px dashed var(--border); border-radius: var(--radius-lg);
    padding: 20px; text-align: center; cursor: pointer;
    transition: all 0.15s; color: var(--faint); font-size: 14px; font-weight: 600;
    background: none; width: 100%; font-family: 'DM Sans', sans-serif; margin-top: 10px;
  }
  .add-from-catalog:hover { border-color: var(--border2); color: var(--muted); }
  .start-facil-btn {
    background: linear-gradient(135deg, var(--garnet), #9e3a4d);
    color: #fff; border: none; border-radius: 10px; padding: 12px 24px;
    font-size: 15px; font-weight: 800; cursor: pointer; font-family: 'Syne', sans-serif;
    display: flex; align-items: center; gap: 8px; transition: opacity 0.15s;
  }
  .start-facil-btn:hover { opacity: 0.9; }
  .session-empty { text-align: center; padding: 80px 20px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--faint); }

  /* TOOLTIP / small helpers */
  .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
  .tag-setting { background: rgba(122,144,176,0.15); color: var(--muted); border: 1px solid rgba(122,144,176,0.2); }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-icon">🌲</div>
        <div>
          <div class="logo-text">FSU Challenge Course</div>
          <div class="logo-sub">Facilitator Toolkit</div>
        </div>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('catalog')">🗂 Catalog</button>
        <button class="nav-tab" onclick="switchTab('session')">📋 Session Planner</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="plan-btn" onclick="openPlan()">
        📋 Session Plan <span class="plan-badge" id="plan-badge" style="display:none">0</span>
      </button>
    </div>
  </div>

  <!-- CATALOG TAB -->
  <div class="main" id="tab-catalog">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div>
        <div class="filter-section-title">Search</div>
        <input class="search-input" type="text" placeholder="Search games..." id="search-input" oninput="renderCatalog()">
      </div>
      <div>
        <div class="filter-section-title">Focus / Goal</div>
        <div class="filter-chips" id="goal-filters"></div>
      </div>
      <div>
        <div class="filter-section-title">Setting</div>
        <div class="chip-row" id="setting-filters"></div>
      </div>
      <div>
        <div class="filter-section-title">Activity Level</div>
        <div class="chip-row" id="activity-filters"></div>
      </div>
      <div>
        <div class="filter-section-title">Group Size</div>
        <input class="num-input" type="number" placeholder="How many people?" id="group-filter" oninput="renderCatalog()" min="1" max="200">
      </div>
      <div>
        <div class="filter-section-title">Max Time (min)</div>
        <input class="num-input" type="number" placeholder="e.g. 20" id="time-filter" oninput="renderCatalog()" min="1">
      </div>
      <button class="clear-btn" onclick="clearFilters()">✕ Clear All Filters</button>
    </div>

    <!-- GAME GRID -->
    <div class="content">
      <div class="content-header">
        <div class="content-count" id="game-count"></div>
        <button class="add-game-btn" onclick="openAddGame()">＋ Add Game</button>
      </div>
      <div id="game-list"></div>
    </div>
  </div>

  <!-- SESSION PLANNER TAB -->
  <div class="main" id="tab-session" style="display:none;">
    <div class="session-tab">
      <div class="session-tab-inner">
        <input class="session-name-input" id="session-name" placeholder="Untitled Session Plan..." value="New Session Plan">
        <div class="session-summary-bar" id="session-summary-bar"></div>
        <div id="session-plan-list" class="session-plan-list"></div>
        <button class="add-from-catalog" onclick="switchTab('catalog')">＋ Browse Catalog to Add Games</button>
        <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;" id="session-actions"></div>
      </div>
    </div>
  </div>

  <!-- FACILITATION MODE (full overlay) -->
  <div id="facil-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;">
    <div class="facil-mode" id="facil-content"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal modal-xl" id="modal-content" onclick="event.stopPropagation()"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const GOAL_META = {
  "community-building": { color: "#3ecf8e", emoji: "🤝" },
  "communication":      { color: "#4a9eff", emoji: "💬" },
  "energizer":          { color: "#f5a623", emoji: "⚡" },
  "leadership":         { color: "#a78bfa", emoji: "🧭" },
  "problem-solving":    { color: "#f472b6", emoji: "🔧" },
  "trust":              { color: "#facc15", emoji: "🫶" },
};
const ALL_GOALS = Object.keys(GOAL_META);
const ALL_SETTINGS = ["indoor", "outdoor"];
const ALL_ACTIVITY = ["low", "medium", "high"];

const DEFAULT_GAMES = [
  { id:1, name:"Helium Stick", description:"Group holds a lightweight stick at chest height using only index fingers and must lower it to the ground together. The stick mysteriously rises before it comes down.", goals:["communication","problem-solving","trust"], minGroup:8, maxGroup:20, minAge:14, maxAge:99, timeMin:10, timeMax:20, activityLevel:"low", setting:["indoor","outdoor"], facilitation:"Debrief around frustration tolerance, communication breakdowns, and listening. Ask: 'What strategy finally worked? Why did it take so long to get there?'", materials:"Thin dowel rod or tent pole" },
  { id:2, name:"Human Knot", description:"Everyone stands in a circle, grabs two different people's hands across the circle, then untangles into a circle without letting go.", goals:["communication","problem-solving","community-building"], minGroup:6, maxGroup:16, minAge:12, maxAge:99, timeMin:10, timeMax:25, activityLevel:"medium", setting:["indoor","outdoor"], facilitation:"Great for groups early in a program. Debrief on roles that emerged, who led, who followed, and how decisions were made.", materials:"None" },
  { id:3, name:"TP Shuffle", description:"Group stands on a log or beam and must rearrange in a specific order without touching the ground.", goals:["communication","trust","problem-solving","leadership"], minGroup:8, maxGroup:20, minAge:14, maxAge:99, timeMin:15, timeMax:30, activityLevel:"medium", setting:["outdoor"], facilitation:"Spotlight moments of physical trust, decision-making under pressure, and whether the group creates a plan before acting.", materials:"Log, beam, or low element" },
  { id:4, name:"Zip Zap Zop", description:"Standing in a circle, participants pass an imaginary ball of energy using eye contact and 'Zip', 'Zap', or 'Zop' in sequence.", goals:["energizer","communication","community-building"], minGroup:8, maxGroup:40, minAge:10, maxAge:99, timeMin:5, timeMax:10, activityLevel:"low", setting:["indoor","outdoor"], facilitation:"Light debrief or none — great opener or re-energizer mid-session.", materials:"None" },
  { id:5, name:"Blind Square", description:"Blindfolded group is given a rope and must form a perfect square using only voice communication.", goals:["communication","leadership","trust"], minGroup:8, maxGroup:18, minAge:14, maxAge:99, timeMin:15, timeMax:25, activityLevel:"low", setting:["indoor","outdoor"], facilitation:"Rich debrief around leadership emergence, listening without seeing, and how the group handled disagreement.", materials:"Long rope, blindfolds" },
  { id:6, name:"Minefield", description:"One partner is blindfolded and guided verbally through an obstacle course by their sighted partner who cannot enter the space.", goals:["trust","communication"], minGroup:6, maxGroup:30, minAge:12, maxAge:99, timeMin:15, timeMax:30, activityLevel:"low", setting:["indoor","outdoor"], facilitation:"Deep debrief around trust, vulnerability, and giving/receiving guidance. Switch roles.", materials:"Blindfolds, random objects for obstacles" },
  { id:7, name:"All Aboard", description:"Group must get all members on a shrinking platform simultaneously, holding for 5 seconds. Platform shrinks each round.", goals:["problem-solving","trust","community-building"], minGroup:8, maxGroup:20, minAge:12, maxAge:99, timeMin:10, timeMax:20, activityLevel:"medium", setting:["indoor","outdoor"], facilitation:"Debrief around creative problem-solving, body autonomy, consent, and how the group decided whose ideas to try.", materials:"Tarp, platform, or taped-off area" },
  { id:8, name:"Warp Speed", description:"Group must pass a ball to every person in a specific order as fast as possible, iterating to beat their own record.", goals:["problem-solving","communication","energizer"], minGroup:8, maxGroup:40, minAge:10, maxAge:99, timeMin:10, timeMax:20, activityLevel:"low", setting:["indoor","outdoor"], facilitation:"Great for iteration mindset. Debrief on systems thinking and creative rule interpretation.", materials:"Small ball or object" },
  { id:9, name:"Two Truths & a Lie", description:"Each person shares three statements about themselves — two true, one false. The group guesses which is the lie.", goals:["community-building","communication"], minGroup:4, maxGroup:25, minAge:10, maxAge:99, timeMin:10, timeMax:20, activityLevel:"low", setting:["indoor","outdoor"], facilitation:"Low-risk disclosure activity. Use early in a program.", materials:"None" },
  { id:10, name:"Spider Web", description:"Group must pass every member through a web of rope or string without touching it. Each hole can only be used once.", goals:["problem-solving","trust","communication","leadership"], minGroup:8, maxGroup:20, minAge:14, maxAge:99, timeMin:20, timeMax:45, activityLevel:"high", setting:["outdoor"], facilitation:"One of the richest debrief activities — planning, physical vulnerability, inclusion, and decision-making all emerge naturally.", materials:"Rope web structure" },
];

// ============================================================
// STATE
// ============================================================
let state = {
  games: [],
  filters: { goals: [], setting: [], activityLevel: [], groupSize: "", maxTime: "", search: "" },
  plan: [],      // array of { gameId, note }
  expanded: {},  // gameId -> bool
  editingGame: null,
  facilIndex: 0,
  timerSeconds: 0,
  timerRunning: false,
  timerInterval: null,
  currentTab: 'catalog',
};

function loadState() {
  try {
    const saved = localStorage.getItem('fsu_cc_games');
    if (saved) state.games = JSON.parse(saved);
    else state.games = JSON.parse(JSON.stringify(DEFAULT_GAMES));
    const savedPlan = localStorage.getItem('fsu_cc_plan');
    if (savedPlan) state.plan = JSON.parse(savedPlan);
    const savedSession = localStorage.getItem('fsu_cc_session_name');
    if (savedSession) setTimeout(() => { const el = document.getElementById('session-name'); if(el) el.value = savedSession; }, 100);
  } catch(e) {
    state.games = JSON.parse(JSON.stringify(DEFAULT_GAMES));
  }
}

function saveGames() {
  localStorage.setItem('fsu_cc_games', JSON.stringify(state.games));
}
function savePlan() {
  localStorage.setItem('fsu_cc_plan', JSON.stringify(state.plan));
}

function getGame(id) { return state.games.find(g => g.id === id); }

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  state.currentTab = tab;
  document.getElementById('tab-catalog').style.display = tab === 'catalog' ? 'flex' : 'none';
  document.getElementById('tab-session').style.display = tab === 'session' ? 'flex' : 'none';
  document.querySelectorAll('.nav-tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'catalog') || (i === 1 && tab === 'session'));
  });
  if (tab === 'session') renderSessionTab();
}

// ============================================================
// FILTERS
// ============================================================
function buildFilterUI() {
  // Goals
  const gf = document.getElementById('goal-filters');
  gf.innerHTML = ALL_GOALS.map(g => `
    <button class="chip" id="gf-${g}" onclick="toggleFilter('goals','${g}')">${GOAL_META[g].emoji} ${g}</button>
  `).join('');
  // Setting
  const sf = document.getElementById('setting-filters');
  sf.innerHTML = ALL_SETTINGS.map(s => `
    <button class="chip" id="sf-${s}" onclick="toggleFilter('setting','${s}')">${s}</button>
  `).join('');
  // Activity
  const af = document.getElementById('activity-filters');
  af.innerHTML = ALL_ACTIVITY.map(a => `
    <button class="chip" id="af-${a}" onclick="toggleFilter('activityLevel','${a}')">${a}</button>
  `).join('');
}

function toggleFilter(key, val) {
  const arr = state.filters[key];
  if (arr.includes(val)) state.filters[key] = arr.filter(x => x !== val);
  else state.filters[key] = [...arr, val];
  updateFilterUI();
  renderCatalog();
}

function updateFilterUI() {
  ALL_GOALS.forEach(g => document.getElementById('gf-'+g)?.classList.toggle('active', state.filters.goals.includes(g)));
  ALL_SETTINGS.forEach(s => document.getElementById('sf-'+s)?.classList.toggle('active', state.filters.setting.includes(s)));
  ALL_ACTIVITY.forEach(a => document.getElementById('af-'+a)?.classList.toggle('active', state.filters.activityLevel.includes(a)));
}

function clearFilters() {
  state.filters = { goals: [], setting: [], activityLevel: [], groupSize: "", maxTime: "", search: "" };
  document.getElementById('search-input').value = '';
  document.getElementById('group-filter').value = '';
  document.getElementById('time-filter').value = '';
  updateFilterUI();
  renderCatalog();
}

function getFilteredGames() {
  const { goals, setting, activityLevel, groupSize, maxTime, search } = state.filters;
  const gs = document.getElementById('search-input')?.value || '';
  const gsize = document.getElementById('group-filter')?.value || '';
  const gtime = document.getElementById('time-filter')?.value || '';
  return state.games.filter(game => {
    if (gs && !game.name.toLowerCase().includes(gs.toLowerCase()) && !game.description.toLowerCase().includes(gs.toLowerCase())) return false;
    if (goals.length > 0 && !goals.some(g => game.goals.includes(g))) return false;
    if (setting.length > 0 && !setting.some(s => game.setting.includes(s))) return false;
    if (activityLevel.length > 0 && !activityLevel.includes(game.activityLevel)) return false;
    if (gsize && (parseInt(gsize) < game.minGroup || parseInt(gsize) > game.maxGroup)) return false;
    if (gtime && game.timeMin > parseInt(gtime)) return false;
    return true;
  });
}

// ============================================================
// RENDER CATALOG
// ============================================================
function renderCatalog() {
  const games = getFilteredGames();
  document.getElementById('game-count').textContent = `${games.length} of ${state.games.length} games`;
  const list = document.getElementById('game-list');
  if (games.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">No games match your filters</div><div style="font-size:13px;color:var(--faint);margin-top:4px;">Try removing some filters or add a new game</div></div>`;
    return;
  }
  list.innerHTML = games.map(game => renderGameCard(game)).join('');
}

function renderGameCard(game) {
  const inPlan = state.plan.some(p => p.gameId === game.id);
  const expanded = state.expanded[game.id];
  return `
    <div class="game-card" id="card-${game.id}">
      <div class="game-card-top">
        <div>
          <div class="game-name">${game.name}</div>
          <div class="game-meta">${game.minGroup}–${game.maxGroup} people &nbsp;·&nbsp; ${game.timeMin}–${game.timeMax} min &nbsp;·&nbsp; ${game.activityLevel} activity</div>
        </div>
        <div class="game-card-actions">
          <button class="btn-add-plan ${inPlan ? 'in-plan' : ''}" onclick="togglePlan(${game.id})">
            ${inPlan ? '✓ In Plan' : '+ Add to Plan'}
          </button>
          <button class="btn-edit" onclick="openEditGame(${game.id})">✏️</button>
        </div>
      </div>
      <div class="goal-tags">
        ${game.goals.map(g => `<span class="goal-tag" style="background:${GOAL_META[g].color}22;color:${GOAL_META[g].color};border:1px solid ${GOAL_META[g].color}33">${GOAL_META[g].emoji} ${g}</span>`).join('')}
        ${game.setting.map(s => `<span class="goal-tag tag-setting">📍 ${s}</span>`).join('')}
      </div>
      <div class="game-desc">${game.description}</div>
      <button class="expand-btn" onclick="toggleExpand(${game.id})">
        ${expanded ? '▲ Less detail' : '▼ Facilitation tips & materials'}
      </button>
      ${expanded ? `
        <div class="game-details">
          <div><div class="detail-label">Facilitation Notes</div><div class="detail-text">${game.facilitation}</div></div>
          ${game.materials ? `<div><div class="detail-label">Materials Needed</div><div class="detail-text">${game.materials}</div></div>` : ''}
          <div><div class="detail-label">Age Range</div><div class="detail-text">${game.minAge === 10 ? 'All ages' : game.minAge + '+'}</div></div>
        </div>` : ''}
    </div>`;
}

function toggleExpand(id) {
  state.expanded[id] = !state.expanded[id];
  renderCatalog();
}

// ============================================================
// PLAN
// ============================================================
function togglePlan(gameId) {
  const idx = state.plan.findIndex(p => p.gameId === gameId);
  if (idx >= 0) state.plan.splice(idx, 1);
  else state.plan.push({ gameId, note: '' });
  savePlan();
  updatePlanBadge();
  renderCatalog();
  if (state.currentTab === 'session') renderSessionTab();
}

function updatePlanBadge() {
  const badge = document.getElementById('plan-badge');
  if (state.plan.length > 0) {
    badge.textContent = state.plan.length;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

// ============================================================
// SESSION TAB
// ============================================================
function renderSessionTab() {
  renderSessionSummary();
  renderSessionList();
  renderSessionActions();
}

function getPlanGames() {
  return state.plan.map(p => ({ ...getGame(p.gameId), note: p.note, planEntry: p })).filter(g => g.id);
}

function renderSessionSummary() {
  const games = getPlanGames();
  const bar = document.getElementById('session-summary-bar');
  if (games.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const totalMin = games.reduce((s,g) => s + g.timeMin, 0);
  const totalMax = games.reduce((s,g) => s + g.timeMax, 0);
  const allGoals = [...new Set(games.flatMap(g => g.goals))];
  const arcOk = checkArc(games);
  bar.innerHTML = `
    <div class="ssb-item"><div class="ssb-label">Games</div><div class="ssb-value">${games.length}</div></div>
    <div class="ssb-item"><div class="ssb-label">Total Time</div><div class="ssb-value">${totalMin}–${totalMax} min</div></div>
    <div class="ssb-item"><div class="ssb-label">Goals Covered</div><div class="ssb-value" style="font-size:13px;">${allGoals.map(g => GOAL_META[g].emoji).join(' ')}</div></div>
    <div class="ssb-item"><div class="ssb-label">Session Arc</div><span class="arc-badge ${arcOk ? '' : 'warn'}">${arcOk ? '✓ Balanced' : '⚠ Check Arc'}</span></div>
  `;
}

function checkArc(games) {
  if (games.length < 2) return true;
  const hasEnergizer = games.some(g => g.goals.includes('energizer'));
  const hasDebrief = games.some(g => g.goals.includes('trust') || g.goals.includes('problem-solving'));
  return hasEnergizer || hasDebrief;
}

function renderSessionList() {
  const list = document.getElementById('session-plan-list');
  const games = getPlanGames();
  if (games.length === 0) {
    list.innerHTML = `<div class="session-empty"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:16px;font-weight:700;color:var(--muted);margin-bottom:6px">No games in your plan yet</div><div style="font-size:13px;color:var(--faint)">Browse the catalog and click "+ Add to Plan"</div></div>`;
    return;
  }
  list.innerHTML = games.map((game, i) => `
    <div class="session-plan-item" draggable="true" id="spi-${game.id}"
      ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})" ondrop="dragDrop(event,${i})" ondragleave="dragLeave(event)">
      <div class="session-item-num">${i+1}</div>
      <div class="session-item-content">
        <div class="session-item-name">${game.name}</div>
        <div style="font-size:12px;color:var(--muted);">${game.timeMin}–${game.timeMax} min &nbsp;·&nbsp; ${game.activityLevel} activity &nbsp;·&nbsp; ${game.minGroup}–${game.maxGroup} people</div>
        <div class="session-item-tags">
          ${game.goals.map(g => `<span class="goal-tag" style="background:${GOAL_META[g].color}22;color:${GOAL_META[g].color};border:1px solid ${GOAL_META[g].color}33;font-size:10px;padding:2px 7px;">${GOAL_META[g].emoji} ${g}</span>`).join('')}
        </div>
        <textarea class="session-item-note" placeholder="Facilitator note for this activity..." rows="2" onchange="updateNote(${game.id}, this.value)">${game.note || ''}</textarea>
      </div>
      <div class="session-item-actions">
        <button class="icon-btn danger" onclick="togglePlan(${game.id})" title="Remove">🗑</button>
        <span class="icon-btn" style="cursor:grab;" title="Drag to reorder">⠿</span>
      </div>
    </div>
  `).join('');
}

function updateNote(gameId, val) {
  const p = state.plan.find(p => p.gameId === gameId);
  if (p) { p.note = val; savePlan(); }
}

function renderSessionActions() {
  const el = document.getElementById('session-actions');
  if (state.plan.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button class="start-facil-btn" onclick="startFacilMode()">▶ Start Facilitation Mode</button>
    <button class="btn-export" onclick="exportPlan('txt')">📄 Export as Text</button>
    <button class="btn-export" onclick="exportPlan('print')">🖨 Print Plan</button>
  `;
}

// ============================================================
// DRAG & DROP
// ============================================================
let dragIdx = null;
function dragStart(e, i) { dragIdx = i; setTimeout(() => e.target.classList.add('dragging'), 0); }
function dragOver(e, i) { e.preventDefault(); document.querySelectorAll('.session-plan-item').forEach(el => el.classList.remove('drag-over')); document.getElementById('spi-' + getPlanGames()[i]?.id)?.classList.add('drag-over'); }
function dragLeave(e) { e.target.closest('.session-plan-item')?.classList.remove('drag-over'); }
function dragDrop(e, i) {
  e.preventDefault();
  if (dragIdx === null || dragIdx === i) return;
  const item = state.plan.splice(dragIdx, 1)[0];
  state.plan.splice(i, 0, item);
  savePlan();
  updatePlanBadge();
  renderSessionTab();
  dragIdx = null;
}

// ============================================================
// PLAN MODAL (quick view from topbar)
// ============================================================
function openPlan() {
  if (state.plan.length === 0) { switchTab('session'); return; }
  switchTab('session');
}

// ============================================================
// ADD / EDIT GAME MODAL
// ============================================================
function openAddGame() { openGameForm(null); }
function openEditGame(id) { openGameForm(id); }

function openGameForm(gameId) {
  const game = gameId ? getGame(gameId) : null;
  const title = game ? 'Edit Game' : 'Add New Game';
  const modal = document.getElementById('modal-content');
  modal.className = 'modal modal-xl';
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${title}</div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label class="form-label">Game Name *</label>
        <input class="form-input" id="f-name" placeholder="e.g. Helium Stick" value="${game ? game.name : ''}">
      </div>
      <div class="form-group form-full">
        <label class="form-label">Description *</label>
        <textarea class="form-textarea" id="f-desc" placeholder="What happens in this activity?">${game ? game.description : ''}</textarea>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Focus / Goals *</label>
        <div class="form-checkbox-group" id="f-goals">
          ${ALL_GOALS.map(g => `<span class="form-checkbox-chip ${game && game.goals.includes(g) ? 'selected' : ''}" onclick="toggleChip(this,'goals','${g}')" data-group="goals" data-val="${g}">${GOAL_META[g].emoji} ${g}</span>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Min Group Size</label>
        <input class="form-input" id="f-mingroup" type="number" value="${game ? game.minGroup : 6}" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Max Group Size</label>
        <input class="form-input" id="f-maxgroup" type="number" value="${game ? game.maxGroup : 20}" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Min Time (min)</label>
        <input class="form-input" id="f-timemin" type="number" value="${game ? game.timeMin : 10}" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Max Time (min)</label>
        <input class="form-input" id="f-timemax" type="number" value="${game ? game.timeMax : 20}" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Activity Level</label>
        <select class="form-select" id="f-activity">
          ${ALL_ACTIVITY.map(a => `<option value="${a}" ${game && game.activityLevel === a ? 'selected' : ''}>${a}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Setting</label>
        <div class="form-checkbox-group" id="f-setting">
          ${ALL_SETTINGS.map(s => `<span class="form-checkbox-chip ${game && game.setting.includes(s) ? 'selected' : ''}" onclick="toggleChip(this,'setting','${s}')" data-group="setting" data-val="${s}">${s}</span>`).join('')}
        </div>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Facilitation Notes</label>
        <textarea class="form-textarea" id="f-facil" placeholder="Key debrief questions, sequencing tips, what to watch for...">${game ? game.facilitation : ''}</textarea>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Materials Needed</label>
        <input class="form-input" id="f-materials" placeholder="e.g. Blindfolds, rope, tarp..." value="${game ? game.materials || '' : ''}">
      </div>
      <div class="form-group">
        <label class="form-label">Min Age</label>
        <input class="form-input" id="f-minage" type="number" value="${game ? game.minAge : 12}" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Max Age</label>
        <input class="form-input" id="f-maxage" type="number" value="${game ? game.maxAge : 99}" min="1">
      </div>
    </div>
    <div class="form-actions">
      ${game ? `<button class="btn-danger" onclick="deleteGame(${game.id})">Delete Game</button>` : ''}
      <button class="btn-secondary" onclick="closeModalDirect()">Cancel</button>
      <button class="btn-primary" onclick="saveGame(${gameId || 'null'})">${game ? 'Save Changes' : 'Add Game'}</button>
    </div>
  `;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function toggleChip(el, group, val) { el.classList.toggle('selected'); }

function saveGame(gameId) {
  const name = document.getElementById('f-name').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  if (!name || !desc) { alert('Name and description are required.'); return; }
  const goals = [...document.querySelectorAll('#f-goals .form-checkbox-chip.selected')].map(el => el.dataset.val);
  const setting = [...document.querySelectorAll('#f-setting .form-checkbox-chip.selected')].map(el => el.dataset.val);
  if (goals.length === 0) { alert('Please select at least one goal.'); return; }
  if (setting.length === 0) { alert('Please select at least one setting.'); return; }
  const gameData = {
    name, description: desc, goals, setting,
    minGroup: parseInt(document.getElementById('f-mingroup').value) || 6,
    maxGroup: parseInt(document.getElementById('f-maxgroup').value) || 20,
    timeMin: parseInt(document.getElementById('f-timemin').value) || 10,
    timeMax: parseInt(document.getElementById('f-timemax').value) || 20,
    activityLevel: document.getElementById('f-activity').value,
    facilitation: document.getElementById('f-facil').value.trim(),
    materials: document.getElementById('f-materials').value.trim(),
    minAge: parseInt(document.getElementById('f-minage').value) || 12,
    maxAge: parseInt(document.getElementById('f-maxage').value) || 99,
  };
  if (gameId) {
    const idx = state.games.findIndex(g => g.id === gameId);
    state.games[idx] = { ...state.games[idx], ...gameData };
  } else {
    const newId = Math.max(0, ...state.games.map(g => g.id)) + 1;
    state.games.push({ id: newId, ...gameData });
  }
  saveGames();
  closeModalDirect();
  renderCatalog();
  if (state.currentTab === 'session') renderSessionTab();
}

function deleteGame(id) {
  if (!confirm('Delete this game? This cannot be undone.')) return;
  state.games = state.games.filter(g => g.id !== id);
  state.plan = state.plan.filter(p => p.gameId !== id);
  saveGames(); savePlan(); updatePlanBadge();
  closeModalDirect();
  renderCatalog();
}

// ============================================================
// MODAL HELPERS
// ============================================================
function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').style.display = 'none'; }

// ============================================================
// FACILITATION MODE
// ============================================================
function startFacilMode() {
  if (state.plan.length === 0) return;
  state.facilIndex = 0;
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  renderFacilMode();
  document.getElementById('facil-overlay').style.display = 'block';
}

function renderFacilMode() {
  const games = getPlanGames();
  const game = games[state.facilIndex];
  if (!game) return;
  const timeTarget = game.timeMin * 60;
  const el = document.getElementById('facil-content');
  el.innerHTML = `
    <div class="facil-header">
      <div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;">FACILITATION MODE &nbsp;·&nbsp; ${state.facilIndex+1} of ${games.length}</div>
        <div class="facil-progress">${games.map((_,i) => `<div class="facil-progress-dot ${i < state.facilIndex ? 'done' : i === state.facilIndex ? 'current' : ''}"></div>`).join('')}</div>
      </div>
      <div class="facil-nav">
        <button class="facil-btn" onclick="facilNav(-1)" ${state.facilIndex === 0 ? 'disabled' : ''}>← Prev</button>
        <button class="facil-btn" onclick="facilNav(1)" ${state.facilIndex === games.length-1 ? 'disabled' : ''}>Next →</button>
        <button class="facil-btn primary" onclick="exitFacilMode()">✕ Exit</button>
      </div>
    </div>

    <div>
      <div class="facil-game-name">${game.name}</div>
      <div class="facil-meta" style="margin-top:10px;">
        <div class="facil-meta-item"><span class="facil-meta-icon">👥</span> ${game.minGroup}–${game.maxGroup} people</div>
        <div class="facil-meta-item"><span class="facil-meta-icon">⏱</span> ${game.timeMin}–${game.timeMax} min</div>
        <div class="facil-meta-item"><span class="facil-meta-icon">🏃</span> ${game.activityLevel} activity</div>
        ${game.setting.map(s => `<div class="facil-meta-item"><span class="facil-meta-icon">📍</span> ${s}</div>`).join('')}
      </div>
    </div>

    <div class="facil-section">
      <div class="facil-section-title">Activity Timer</div>
      <div class="timer-display ${state.timerSeconds > game.timeMax*60 ? 'over' : state.timerSeconds > game.timeMin*60 ? 'warning' : ''}" id="timer-display">${formatTime(state.timerSeconds)}</div>
      <div class="timer-controls">
        <button class="timer-btn ${state.timerRunning ? 'active' : ''}" onclick="toggleTimer(${timeTarget})">${state.timerRunning ? '⏸ Pause' : '▶ Start'}</button>
        <button class="timer-btn" onclick="resetTimer()">↺ Reset</button>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--muted);text-align:center;">
        Target: ${game.timeMin}–${game.timeMax} min &nbsp;·&nbsp; ${state.timerSeconds > game.timeMax*60 ? '⚠ Over time' : state.timerSeconds > game.timeMin*60 ? '⚡ In the zone' : 'Ready to start'}
      </div>
    </div>

    <div class="facil-section">
      <div class="facil-section-title">Activity Description</div>
      <div class="facil-text">${game.description}</div>
    </div>

    ${game.facilitation ? `<div class="facil-section">
      <div class="facil-section-title">Facilitation & Debrief Notes</div>
      <div class="facil-text">${game.facilitation}</div>
    </div>` : ''}

    ${game.materials ? `<div class="facil-section">
      <div class="facil-section-title">Materials Needed</div>
      <div class="facil-text">${game.materials}</div>
    </div>` : ''}

    ${game.note ? `<div class="facil-section" style="border-color:var(--gold);border-left:3px solid var(--gold)">
      <div class="facil-section-title" style="color:var(--gold)">Your Session Note</div>
      <div class="facil-text">${game.note}</div>
    </div>` : ''}

    <div class="facil-section">
      <div class="facil-section-title">Goal Focus</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${game.goals.map(g => `<span class="goal-tag" style="background:${GOAL_META[g].color}22;color:${GOAL_META[g].color};border:1px solid ${GOAL_META[g].color}33;font-size:13px;padding:5px 12px;">${GOAL_META[g].emoji} ${g}</span>`).join('')}
      </div>
    </div>
  `;
}

function facilNav(dir) {
  const games = getPlanGames();
  state.facilIndex = Math.max(0, Math.min(games.length-1, state.facilIndex + dir));
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.timerSeconds = 0;
  renderFacilMode();
}

function exitFacilMode() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.timerSeconds = 0;
  document.getElementById('facil-overlay').style.display = 'none';
}

function toggleTimer() {
  if (state.timerRunning) {
    clearInterval(state.timerInterval);
    state.timerRunning = false;
  } else {
    state.timerRunning = true;
    state.timerInterval = setInterval(() => {
      state.timerSeconds++;
      const game = getPlanGames()[state.facilIndex];
      const disp = document.getElementById('timer-display');
      if (disp && game) {
        disp.textContent = formatTime(state.timerSeconds);
        disp.className = 'timer-display' + (state.timerSeconds > game.timeMax*60 ? ' over' : state.timerSeconds > game.timeMin*60 ? ' warning' : '');
      }
    }, 1000);
  }
  renderFacilMode();
}

function resetTimer() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.timerSeconds = 0;
  renderFacilMode();
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ============================================================
// EXPORT
// ============================================================
function exportPlan(type) {
  const sessionName = document.getElementById('session-name')?.value || 'Session Plan';
  const games = getPlanGames();
  if (type === 'txt') {
    const totalMin = games.reduce((s,g) => s + g.timeMin, 0);
    const totalMax = games.reduce((s,g) => s + g.timeMax, 0);
    const allGoals = [...new Set(games.flatMap(g => g.goals))];
    const lines = [
      '═══════════════════════════════════════════',
      `  FSU CHALLENGE COURSE — SESSION PLAN`,
      '═══════════════════════════════════════════',
      `  ${sessionName}`,
      `  Date: ${new Date().toLocaleDateString()}`,
      `  Games: ${games.length}  |  Est. Time: ${totalMin}–${totalMax} min`,
      `  Goals: ${allGoals.join(', ')}`,
      '═══════════════════════════════════════════',
      '',
      ...games.map((g, i) => [
        `${i+1}. ${g.name.toUpperCase()}`,
        `   ⏱  ${g.timeMin}–${g.timeMax} min   👥  ${g.minGroup}–${g.maxGroup} people   🏃  ${g.activityLevel} activity`,
        `   🎯  ${g.goals.join(', ')}   📍  ${g.setting.join(', ')}`,
        ``,
        `   DESCRIPTION`,
        `   ${g.description}`,
        ``,
        `   FACILITATION NOTES`,
        `   ${g.facilitation}`,
        g.materials ? `\n   MATERIALS: ${g.materials}` : '',
        g.note ? `\n   SESSION NOTE: ${g.note}` : '',
        '',
        '───────────────────────────────────────────',
        '',
      ].filter(Boolean).join('\n')),
    ].join('\n');
    const blob = new Blob([lines], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${sessionName.replace(/\s+/g,'-')}.txt`;
    a.click();
  } else if (type === 'print') {
    window.print();
  }
}

// ============================================================
// INIT
// ============================================================
loadState();
buildFilterUI();
renderCatalog();
updatePlanBadge();
</script>
